<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hilda • Cosmic Birthday Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* 🎬 CINEMATIC BARS */
.bar {
  position: fixed;
  width: 100%;
  height: 12vh;
  background: black;
  z-index: 1000;
  animation: bars 3s ease forwards;
}

.top { top: 0; }
.bottom { bottom: 0; }

@keyframes bars {
  0% { height: 12vh; }
  100% { height: 0vh; }
}

/* 🎬 TITLE INTRO */
#intro {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 2rem;
  letter-spacing: 8px;
  z-index: 999;
  background: black;
  animation: fadeOut 4s ease forwards;
}

@keyframes fadeOut {
  0% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

/* 🎆 FLASH */
#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
}
</style>
</head>

<body>

<div class="bar top"></div>
<div class="bar bottom"></div>

<div id="intro">A COSMIC MESSAGE FOR HILDA</div>
<div id="flash"></div>

<script>

/* =========================
   🎧 SOUND ENGINE (GOD MODE)
========================= */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function sound(type) {
  const o = audio.createOscillator();
  const g = audio.createGain();

  o.connect(g);
  g.connect(audio.destination);

  if (type === "boom") {
    o.type = "sawtooth";
    o.frequency.value = 80;
    g.gain.value = 0.7;
  } else if (type === "whoosh") {
    o.type = "sine";
    o.frequency.value = 400;
    g.gain.value = 0.2;
  } else {
    o.type = "triangle";
    o.frequency.value = 800 + Math.random()*600;
    g.gain.value = 0.15;
  }

  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.6);
  o.stop(audio.currentTime + 0.6);
}

/* =========================
   🪐 THREE.JS GOD SCENE
========================= */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 60;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* =========================
   🌌 SPIRAL GALAXY SYSTEM
========================= */
const starCount = 6000;
const geo = new THREE.BufferGeometry();

const pos = new Float32Array(starCount * 3);

for (let i = 0; i < starCount; i++) {

  let angle = i * 0.01;
  let radius = 5 + i * 0.01;

  pos[i*3] = Math.cos(angle) * radius;
  pos[i*3+1] = (Math.random()-0.5) * 20;
  pos[i*3+2] = Math.sin(angle) * radius;
}

geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));

const mat = new THREE.PointsMaterial({
  size: 0.6,
  color: 0xffffff
});

const galaxy = new THREE.Points(geo, mat);
scene.add(galaxy);

/* =========================
   ✨ CORE ENERGY SPHERE
========================= */
const core = new THREE.Mesh(
  new THREE.SphereGeometry(6, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xff4fd8, wireframe: true })
);

scene.add(core);

/* =========================
   🎆 FIREWORK SYSTEM
========================= */
let bursts = [];

class Burst {
  constructor() {
    this.particles = [];

    for (let i = 0; i < 40; i++) {
      this.particles.push({
        x: 0, y: 0, z: 0,
        vx: (Math.random()-0.5)*2,
        vy: (Math.random()-0.5)*2,
        vz: (Math.random()-0.5)*2,
        life: 100
      });
    }
  }
}

const fireGeo = new THREE.BufferGeometry();
const fireMat = new THREE.PointsMaterial({ color: 0xffccff, size: 0.7 });
const firePoints = new THREE.Points(fireGeo, fireMat);
scene.add(firePoints);

let fireArray = [];

/* =========================
   🎆 EXPLOSION FUNCTION
========================= */
function explode() {

  document.getElementById("flash").style.opacity = 0.9;
  setTimeout(()=>document.getElementById("flash").style.opacity=0,100);

  sound("boom");
  sound("whoosh");

  for (let i = 0; i < 80; i++) {
    fireArray.push({
      x: 0, y: 0, z: 0,
      vx: (Math.random()-0.5)*4,
      vy: (Math.random()-0.5)*4,
      vz: (Math.random()-0.5)*4,
      life: 100,
      color: Math.random()
    });
  }
}

/* =========================
   📱 INTERACTION
========================= */
window.addEventListener("click", ()=>{
  if (audio.state === "suspended") audio.resume();
  explode();
});

window.addEventListener("touchstart", ()=>{
  if (audio.state === "suspended") audio.resume();
  explode();
});

/* =========================
   🌠 SHOOTING STARS
========================= */
let shootingStars = [];

function spawnStar() {
  shootingStars.push({
    x: (Math.random()-0.5)*100,
    y: 50,
    z: (Math.random()-0.5)*50,
    vx: -1,
    vy: -1,
    vz: 0
  });
}

/* =========================
   🎬 CAMERA SHAKE
========================= */
function shake() {
  camera.position.x = (Math.random()-0.5)*2;
  camera.position.y = (Math.random()-0.5)*2;
}

/* =========================
   🔁 ANIMATION LOOP
========================= */
function animate() {
  requestAnimationFrame(animate);

  galaxy.rotation.y += 0.001;
  core.rotation.y += 0.01;

  /* fireworks update */
  fireArray.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.z += p.vz;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.vz *= 0.98;
    p.life--;
  });

  /* shooting stars */
  if (Math.random() < 0.01) spawnStar();

  shootingStars.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
  });

  shake();

  renderer.render(scene, camera);
}

animate();

/* =========================
   📏 RESIZE
========================= */
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
